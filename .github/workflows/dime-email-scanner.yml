name: Dime Email Scanner

on:
  schedule:
    - cron: '0 1 * * *'   # 08:00 น. เวลาไทย (UTC+7) = 01:00 UTC
  workflow_dispatch:        # กดรันมือได้จากแท็บ Actions

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ติดตั้ง dependencies
        run: pip install pikepdf pdfplumber

      - name: เช็คเมล Dime, ถอดรหัส PDF, parse, บันทึกลง Supabase
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          DIME_PDF_PASSWORD: ${{ secrets.DIME_PDF_PASSWORD }}
          SUPABASE_URL: https://xhxyxkphsxujwmoukonk.supabase.co
          SUPABASE_KEY: sb_publishable_kOtnsJpUcMeAO4l5qhSPmQ_em5Ealhs
        run: python3 scripts/dime_email_scanner.py

      - name: ลบไฟล์ PDF ชั่วคราวทั้งหมด (กันหลงเหลือ)
        if: always()
        run: rm -f /tmp/*.pdf /tmp/*.enc
